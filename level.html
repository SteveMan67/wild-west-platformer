<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/styles/style.css">
  <link rel="stylesheet" href="/styles/home.css">
  <link rel="stylesheet" href="/styles/level.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
  <title>Platformed</title>
</head>

<body>
  <div class="grid">
    <div class="topbar">
      <a href="/" class="title">Platformed</a>
      <div class="right-nav">
        <a href="/editor" target="" class="link-button">Editor</a>
        <a href="/myLevels" class="link-button my-levels">My Levels</a>
      </div>
    </div>
    <div class="content">
      <div class="content-wrapper">
        <div class="game-wrapper">
          <div class="game">
            <canvas class="canvas"></canvas>
            <div class="fullscreen-control">
              <img class="maximize" src="/assets/icons/maximize.svg" alt="">
              <img class="minimize" src="/assets/icons/minimize.svg">
            </div>
            <div class="mobile-controls hidden">
              <div class="joystick">
                <div class="knob"></div>
              </div>
              <div class="jump">
                <img src="/assets/icons/jump.svg" alt="">
              </div>
            </div>
            <div class="loading-screen">
              <p>loading...</p>
              <div class="progress-bar">
                <div class="progress-bar-fill"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="info">
          <div class="row">
            <div class="name-wrapper">
              <h2 class="name"></h2>
              <p>-</p>
              <p class="username"></p>
            </div>
            <div class="approval-wrapper">
              <p class="approval-percentage">100%</p>
              <div class="thumbs-up-wrapper">
                <img class="fill" src="/assets/icons/thumbs-up-fill.svg" alt="">
                <img class="nofill" src="/assets/icons/thumbs-up.svg" id="thumbs-up">
              </div>
              <div class="thumbs-down-wrapper">
                <img class="fill" src="/assets//icons/thumbs-down-fill.svg" alt="">
                <img class="nofill" src="/assets/icons/thumbs-down.svg" id="thumbs-down">
              </div>
            </div>
          </div>
          <div class="row">
            <p class="description"></p>
            <div class="plays-wrapper">
              <p>plays/finishes</p>
              <p class="plays-finshes"><span class="plays"></span>/<span class="finishes"></span></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module">

  </script>
  <script type="module" src="/javascript/site.js"></script>
  <script type="module">
    import { init, setMode } from '/javascript/site.js'
    import { loadMapFromData, loadOwnerData } from '/javascript/file-utils.js'
    setMode('play')
    window.addEventListener('loading:progress', async (e) => {
      const { loaded, total } = e.detail
      const percentage = (loaded / total) * 100
      document.querySelector('.progress-bar-fill').style.width = `${percentage}px`
    })
    window.addEventListener('level:loaded', async (e) => {
      const levelData = await e.detail
      await loadMapFromData(levelData.data)
      init()

      const loadingScreen = document.querySelector('.loading-screen')
      if (loadingScreen) {
        loadingScreen.remove()
      }

    })
  </script>
  <script type="module" src="/javascript/level.js" defer></script>
</body>

</html>
